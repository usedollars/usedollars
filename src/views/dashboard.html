<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>USEDOLLARS.COM Dashboard</title>
  <link rel="stylesheet" href="/css/dashboard.css" />
  <script defer src="/js/dashboard.js"></script>
</head>
<body>
  <!-- Logo fijo -->
  <header>
    <h1>USEDOLLARS.COM</h1>
    <p>Bienvenido al sistema, un gusto tenerte por aquí, Génesis</p>
  </header>

  <!-- Sidebar -->
  <aside>
    <nav>
      <ul>
        <li><a href="#">Inicio</a></li>
        <li><a href="#" id="openModalBtn">Nueva Transacción</a></li>
        <li><a href="#">Historial</a></li>
        <li><a href="#">Resumen</a></li>
      </ul>
    </nav>
  </aside>

  <!-- Contenido principal -->
  <main>
    <section>
      <h2>Balance total</h2>
      <p id="balance-total">0.00</p>
    </section>

    <section>
      <h3>Transacciones recientes</h3>
      <ul id="transacciones-recientes"></ul>
    </section>
  </main>

  <!-- Modal Nueva Transacción -->
  <div id="transactionModal" class="modal" aria-hidden="true">
    <div class="modal-content">
      <h3>Nueva Transacción</h3>
      <form id="txForm">
        <label>From Wallet ID <input name="fromWalletId" required /></label>
        <label>To Wallet ID <input name="toWalletId" required /></label>
        <label>Monto <input name="amount" type="number" step="0.01" required /></label>
        <label>Moneda <input name="currency" value="USD" /></label>
        <label>Nota <input name="note" /></label>
        <div class="modal-actions">
          <button type="button" id="closeModalBtn">Cancelar</button>
          <button type="submit">Enviar</button>
        </div>
      </form>
    </div>
  </div>
</body>
</html>
